{{- if .Values.autoscaling.public.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: public
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: public

  minReplicas: {{ .Values.autoscaling.public.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.public.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.public.cpuUtilization }}
{{- end }}
