apiVersion: apps/v1
kind: Deployment
metadata:
  name: public
  labels:
    app: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public
  template:
    metadata:
      labels:
        app: public
    spec:
      # Pod-level security context
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: public
          image: docker.io/dpuiu2/chess_web-public:2.7
          # imagePullPolicy: IfNotPresent, Always , Never
          args:
            - bash
            - -c
            - >
              exec /opt/venv/bin/gunicorn
              -w 2
              -b 0.0.0.0:5000
              --timeout 600
              --log-level debug
              --access-logfile -
              --error-logfile -
              app_public:app
          env:
            - name: CHESSDB_HOST
              value: mysql
            - name: CHESSDB_NAME
              value: CHESS_DB
            - name: CHESSDB_PASS
              value: your_public_password
            - name: CHESSDB_USER
              value: chess_public
            - name: CHESS_FRONTEND_DIST
              value: /app/dist
            - name: CORS_ALLOWED_ORIGINS
              value: https://dev.sites.idies.jhu.edu
            - name: FLASK_DEBUG
              value: "0"
            - name: FLASK_PUBLIC_PORT
              value: "5000"
            - name: FLASK_APPLICATION_ROOT
              value: /chess_app
          ports:
            - containerPort: 5000
          # Container-level security context
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Container-level resources
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: public
  labels:
    app: public
spec:
  type: ClusterIP
  selector:
    app: public
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
