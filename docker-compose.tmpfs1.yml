#version: "3.9"

services:

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      CHESSDB_NAME: ${CHESSDB_NAME}
      CHESSDB_ADMIN_USER: ${CHESSDB_ADMIN_USER}
      CHESSDB_ADMIN_PASS: ${CHESSDB_ADMIN_PASS}
      CHESSDB_PUBLIC_USER: ${CHESSDB_PUBLIC_USER}
      CHESSDB_PUBLIC_PASS: ${CHESSDB_PUBLIC_PASS}
      CHESSDB_BACKUP_URL: ${CHESSDB_BACKUP_URL}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./my_custom.cnf:/etc/mysql/conf.d/my_custom.cnf
      - ./CHESSApp_DB/chess.db.schema.mysql.sql:/docker-entrypoint-initdb.d/db_init_1.sql:ro
      - ./db_init.sh:/docker-entrypoint-initdb.d/db_init_2.sh:ro
      - ./db_load.sh:/docker-entrypoint-initdb.d/db_init_3.sh:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  public:
    image: dpuiu2/chess_web-public:1.0
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      bash -c "
      curl -L --fail --retry 5 "$CHESSAPP_DATA_URL" | tar -xz -C /tmp &&
      exec /opt/venv/bin/gunicorn -w "${GUNICORN_WORKERS:-2}" -b 0.0.0.0:5000 --timeout 600 --log-level debug --access-logfile - --error-logfile - app_public:app
      "
    environment:
      CHESSDB_HOST: mysql
      CHESSDB_NAME: ${CHESSDB_NAME}
      CHESSDB_USER: ${CHESSDB_PUBLIC_USER}
      CHESSDB_PASS: ${CHESSDB_PUBLIC_PASS}
      FLASK_DEBUG: 0
      FLASK_PUBLIC_PORT: ${FLASK_PUBLIC_PORT}
      CHESS_FRONTEND_DIST: /app/dist
      CORS_ALLOWED_ORIGINS: http://localhost:${FLASK_PUBLIC_PORT}
      CHESSAPP_DATA_URL: ${CHESSAPP_DATA_URL}
    ports:
      - "${FLASK_PUBLIC_PORT}:5000"
    tmpfs:
      - /tmp:size=1G
