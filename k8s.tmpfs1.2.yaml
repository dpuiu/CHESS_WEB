apiVersion: v1
kind: Secret
metadata:
  name: chess-db-secret
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: your_secure_password
  CHESSDB_ADMIN_PASS: your_admin_password
  CHESSDB_PUBLIC_PASS: your_public_password

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  clusterIP: None
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  serviceName: mysql
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:

      initContainers:
      - name: download-init
        image: curlimages/curl:8.2.1
        command:
        - sh
        - -c
        - |
          set -euo pipefail

          BASE=ftp://ftp.ccb.jhu.edu/pub/dpuiu/CHESS_WEB

          curl -L --fail --retry 5 $BASE/my_custom.cnf \
            -o /config/my_custom.cnf

          curl -L --fail --retry 5 $BASE/chess.db.schema.mysql.sql \
            -o /init/1_schema.sql

          curl -L --fail --retry 5 $BASE/db_init.sql \
            -o /init/2_init.sql

          curl -L --fail --retry 5 ftp://ftp.ccb.jhu.edu/pub/dpuiu/CHESS_WEB/CHESSApp_prod_backups.db.gz | zcat > /tmp/db_init_3.sql

        volumeMounts:
        - name: initdb
          mountPath: /init
        - name: mysql-config
          mountPath: /config

      containers:
      - name: mysql
        image: mysql:8.0

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chess-db-secret
              key: MYSQL_ROOT_PASSWORD

        - name: CHESSDB_NAME
          value: CHESS_DB

        - name: CHESSDB_ADMIN_USER
          value: chess_admin

        - name: CHESSDB_ADMIN_PASS
          valueFrom:
            secretKeyRef:
              name: chess-db-secret
              key: CHESSDB_ADMIN_PASS

        - name: CHESSDB_PUBLIC_USER
          value: chess_public

        - name: CHESSDB_PUBLIC_PASS
          valueFrom:
            secretKeyRef:
              name: chess-db-secret
              key: CHESSDB_PUBLIC_PASS

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql

        - name: initdb
          mountPath: /docker-entrypoint-initdb.d

        - name: mysql-config
          mountPath: /etc/mysql/conf.d/my_custom.cnf
          subPath: my_custom.cnf

        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1"
          initialDelaySeconds: 20
          periodSeconds: 5

      volumes:
      - name: mysql-data
        emptyDir: {}

      - name: initdb
        emptyDir: {}

      - name: mysql-config
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: public
spec:
  selector:
    app: public
  ports:
  - port: 5000
    targetPort: 5000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public
spec:
  replicas: 1

  selector:
    matchLabels:
      app: public

  template:
    metadata:
      labels:
        app: public

    spec:

      initContainers:
      - name: download-data
        image: curlimages/curl:8.2.1
        command:
        - sh
        - -c
        - |
          set -euo pipefail

          curl -L --fail --retry 5 \
          ftp://ftp.ccb.jhu.edu/pub/dpuiu/CHESS_WEB/CHESSApp_dev_backups.data.tgz \
          -o /tmp/data.tgz

          tar -xzf /tmp/data.tgz -C /data

        volumeMounts:
        - name: app-data
          mountPath: /data

      containers:
      - name: public
        image: dpuiu2/chess_web-public:1.0

        command:
        - bash
        - -c
        - |
          exec /opt/venv/bin/gunicorn \
            -w 2 \
            -b 0.0.0.0:5000 \
            --timeout 600 \
            --log-level debug \
            --access-logfile - \
            --error-logfile - \
            app_public:app

        env:
        - name: CHESSDB_HOST
          value: mysql

        - name: CHESSDB_NAME
          value: CHESS_DB

        - name: CHESSDB_USER
          value: chess_public

        - name: CHESSDB_PASS
          valueFrom:
            secretKeyRef:
              name: chess-db-secret
              key: CHESSDB_PUBLIC_PASS

        ports:
        - containerPort: 5000

        volumeMounts:
        - name: app-data
          mountPath: /data

      volumes:
      - name: app-data
        emptyDir: {}
