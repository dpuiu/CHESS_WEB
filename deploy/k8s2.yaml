apiVersion: apps/v1
kind: Deployment
metadata:
  name: public
  labels:
    app: public
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public
  template:
    metadata:
      labels:
        app: public
    spec:
      # Pod-level security context
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: public
          image: dpuiu2/chess_web-public:2.4
          args:
            - bash
            - -c
            - >
              exec /opt/venv/bin/gunicorn
              -w 2
              -b 0.0.0.0:5000
              --timeout 600
              --log-level debug
              --access-logfile -
              --error-logfile -
              app_public:app
          env:
            - name: CHESSDB_HOST
              value: mysql
            - name: CHESSDB_NAME
              value: CHESS_DB
            - name: CHESSDB_PASS
              value: your_public_password
            - name: CHESSDB_USER
              value: chess_public
            - name: CHESS_FRONTEND_DIST
              value: /app/dist
            - name: CORS_ALLOWED_ORIGINS
#              value: http://localhost:5000  
              value: https://dev.sites.idies.jhu.edu
            - name: FLASK_DEBUG
              value: "0"
            - name: FLASK_PUBLIC_PORT
              value: "5000"
            - name: FLASK_APPLICATION_ROOT
              value: /chess_app
          ports:
            - containerPort: 5000
          # Container-level security context
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Container-level resources
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: public
  labels:
    app: public
spec:
  type: ClusterIP
  selector:
    app: public
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000

apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      # Pod-level security context
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: dpuiu2/chess_web-mysql:2.0
          ports:
            - containerPort: 3306
          env:
            - name: CHESSDB_ADMIN_PASS
              value: your_admin_password
            - name: CHESSDB_ADMIN_USER
              value: chess_admin
            - name: CHESSDB_NAME
              value: CHESS_DB
            - name: CHESSDB_PUBLIC_PASS
              value: your_public_password
            - name: CHESSDB_PUBLIC_USER
              value: chess_public
            - name: MYSQL_ROOT_PASSWORD
              value: your_secure_password
          # Container-level security
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Container-level resources
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx
  namespace: chess-web
  creationTimestamp: null
spec:
  ingressClassName: nginx
  rules:
    - host: dev.sites.idies.jhu.edu
      http:
        paths:
          - path: /chess_app
            pathType: Prefix
            backend:
              service:
                name: public
                port:
                  number: 80
status:
  loadBalancer: {}

