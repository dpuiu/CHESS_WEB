apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      # Pod-level security context
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: dpuiu2/chess_web-mysql:2.0
          ports:
            - containerPort: 3306
          env:
            - name: CHESSDB_ADMIN_PASS
              value: your_admin_password
            - name: CHESSDB_ADMIN_USER
              value: chess_admin
            - name: CHESSDB_NAME
              value: CHESS_DB
            - name: CHESSDB_PUBLIC_PASS
              value: your_public_password
            - name: CHESSDB_PUBLIC_USER
              value: chess_public
            - name: MYSQL_ROOT_PASSWORD
              value: your_secure_password
          # Container-level security
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Container-level resources
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
